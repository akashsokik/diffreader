<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>diffreader</title>
<style>
:root {
  --bg: #161618; --bg-alt: #1c1c1f; --bg-inset: #111113;
  --border: #2a2a2e; --border-soft: #232327;
  --text: #e4e4e7; --muted: #8a8a93; --faint: #6a6a72;
  --add-bg: #15241b; --add-gutter: #1a3a28; --del-bg: #2a1619; --del-gutter: #45222a;
  --add-fg: #4ec07a; --del-fg: #e5707a; --accent: #5b9df6; --accent-soft: #5b9df612; --warn: #d6a14a;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body, #root { margin: 0; height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13.5px; }

.app { display: grid; grid-template-columns: 244px 1fr 320px; grid-template-rows: auto 1fr;
  grid-template-areas: "header header header" "files main sidebar"; height: 100vh; }

.header { grid-area: header; display: flex; align-items: center; gap: 10px; padding: 0 14px;
  height: 46px; border-bottom: 1px solid var(--border); background: var(--bg-alt); }
.header .brand { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }
.header .repo { font-family: var(--mono); font-size: 12.5px; color: var(--text); }
.header .spacer { flex: 1; }
.chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--text);
  background: var(--bg-inset); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; }
.chip.subtle { color: var(--muted); }
.chip.mono { font-family: var(--mono); }
.totals { display: flex; gap: 10px; align-items: center; font-size: 12px; margin-right: 4px; }
.t-files { color: var(--muted); }
.t-add { color: var(--add-fg); }
.t-del { color: var(--del-fg); }
.seg { display: inline-flex; background: var(--bg-inset); border: 1px solid var(--border); border-radius: 7px; padding: 2px; }
.seg button { background: none; border: none; color: var(--muted); font-family: var(--sans); font-size: 12px;
  padding: 3px 12px; border-radius: 5px; cursor: pointer; }
.seg button.on { background: var(--border); color: var(--text); }
.seg button:hover { color: var(--text); }
.btn { background: var(--bg-inset); color: var(--text); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 12px; font-size: 13px; cursor: pointer; font-family: var(--sans); }
.btn:hover { border-color: var(--faint); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #0b1220; font-weight: 500; }
.btn.primary:hover { filter: brightness(1.08); }
.btn:disabled { opacity: 0.45; cursor: default; }

.filelist { grid-area: files; border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg-alt); }
.filelist h2, .sidebar h2 { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.7px;
  color: var(--faint); padding: 13px 14px 7px; margin: 0; font-weight: 600; }
.filelist-item { display: flex; align-items: center; gap: 7px; width: 100%; text-align: left;
  padding: 5px 14px; cursor: pointer; font-size: 12.5px; background: none; border: none; color: var(--text); font-family: var(--sans); }
.filelist-item:hover { background: var(--bg-inset); }
.filelist-item.active { background: var(--bg-inset); }
.filelist-item.active .name { color: var(--text); font-weight: 500; }
.filelist-item .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  direction: rtl; text-align: left; color: var(--muted); }
.filelist-item .nums { font-size: 11px; white-space: nowrap; }
.filelist-item .count { font-size: 10.5px; background: var(--accent-soft); color: var(--accent);
  border-radius: 9px; padding: 0 6px; min-width: 16px; text-align: center; }
.repo-author { padding: 12px 14px; color: var(--faint); font-size: 11.5px; border-top: 1px solid var(--border-soft); margin-top: 6px; }
.status-dot { font-family: var(--mono); font-size: 10.5px; width: 11px; display: inline-block; }
.status-added { color: var(--add-fg); }
.status-deleted { color: var(--del-fg); }
.status-renamed { color: var(--warn); }
.status-modified { color: var(--muted); }

.main { grid-area: main; overflow-y: auto; padding: 16px; }
.summary { background: var(--bg-alt); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; }
.summary h3 { margin: 0 0 7px; font-size: 14px; font-weight: 600; }
.summary p { margin: 0; white-space: pre-wrap; line-height: 1.55; color: var(--text); }
.summary .meta { color: var(--faint); font-size: 11.5px; margin-top: 9px; }
.file { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
.file-head { display: flex; align-items: center; gap: 9px; background: var(--bg-alt); padding: 8px 12px;
  border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12.5px;
  position: sticky; top: 0; z-index: 1; cursor: pointer; user-select: none; }
.file-head .spacer { flex: 1; }
.file-head .chev { color: var(--faint); width: 10px; }
.file-head .path { font-weight: 500; }
.file-explanation { padding: 8px 12px; background: var(--bg-inset); border-bottom: 1px solid var(--border-soft);
  font-size: 12.5px; line-height: 1.5; color: var(--muted); }
.binary { padding: 14px; color: var(--muted); }

table.hunk { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12.5px; table-layout: fixed; }
.hunk-header td { background: var(--bg-inset); color: var(--faint); padding: 3px 10px; border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); }
.dline { line-height: 1.55; }
.dline.add { background: var(--add-bg); }
.dline.del { background: var(--del-bg); }
.dline.meta { color: var(--faint); font-style: italic; }
.hunk col.c-num { width: 48px; }
.gutter { text-align: right; padding: 0 9px; color: var(--faint); user-select: none; white-space: nowrap; vertical-align: top; }
.dline.add .gutter { background: var(--add-gutter); }
.dline.del .gutter { background: var(--del-gutter); }
.code { padding: 0 10px 0 12px; white-space: pre-wrap; word-break: break-word; position: relative; vertical-align: top; }
.code .sign { color: var(--faint); padding-right: 4px; }
.dline.add .code .sign { color: var(--add-fg); }
.dline.del .code .sign { color: var(--del-fg); }
.code:hover .add-note { opacity: 1; }
.add-note { opacity: 0; position: absolute; right: 5px; top: 1px; background: var(--accent); color: #0b1220;
  border: none; border-radius: 4px; width: 17px; height: 17px; line-height: 1; font-size: 13px; cursor: pointer; transition: opacity 0.1s; }
.dline.has-note .code { background-color: rgba(214, 161, 74, 0.09); }

.split { font-family: var(--mono); font-size: 12.5px; line-height: 1.55; }
.srow { display: grid; grid-template-columns: 44px minmax(0, 1fr) 44px minmax(0, 1fr); }
.srow-full.hunk-header { padding: 3px 10px; background: var(--bg-inset); color: var(--faint);
  border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); }
.srow-full.meta { padding: 0 10px 0 56px; color: var(--faint); font-style: italic; }
.srow-full.inline-note { padding: 8px 12px; background: var(--bg-inset); }
.g-gutter { text-align: right; padding: 0 9px; color: var(--faint); user-select: none; white-space: nowrap; }
.g-code { padding: 0 10px 0 12px; white-space: pre-wrap; word-break: break-word; position: relative; min-width: 0; }
.g-code .sign { color: var(--faint); padding-right: 4px; }
.g-code.add { background: var(--add-bg); } .g-code.add .sign { color: var(--add-fg); }
.g-code.del { background: var(--del-bg); } .g-code.del .sign { color: var(--del-fg); }
.g-gutter.add { background: var(--add-gutter); }
.g-gutter.del { background: var(--del-gutter); }
.g-code.blank, .g-gutter.blank { background: var(--bg-inset); }
.g-code.divide { border-right: 1px solid var(--border-soft); }
.g-code:hover .add-note { opacity: 1; }
.g-code.has-note { background-color: rgba(214, 161, 74, 0.09); }

.inline-note td { padding: 8px 12px; background: var(--bg-inset); }
.note-card { background: var(--bg-alt); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-family: var(--sans); }
.note-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.note-body { white-space: pre-wrap; line-height: 1.45; font-size: 13px; }
.remove { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 15px; line-height: 1; padding: 0 2px; }
.remove:hover { color: var(--del-fg); }
.note-form { font-family: var(--sans); }
.note-form select, .note-form textarea { width: 100%; background: var(--bg-inset); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-family: var(--sans); font-size: 13px; margin-bottom: 6px; }
.note-form textarea { min-height: 58px; resize: vertical; }
.note-form .row { display: flex; gap: 8px; align-items: center; }
.note-form select { width: auto; }

.sidebar { grid-area: sidebar; border-left: 1px solid var(--border); background: var(--bg-alt); overflow-y: auto; display: flex; flex-direction: column; }
.sidebar h2 .count { background: var(--accent-soft); color: var(--accent); border-radius: 9px; padding: 0 6px; font-size: 10.5px; margin-left: 4px; }
.sidebar-notes { flex: 1; padding: 0 12px; }
.hint { color: var(--muted); font-size: 12.5px; padding: 0 2px; line-height: 1.5; }
.sidebar-note { position: relative; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; cursor: pointer; font-size: 12.5px; }
.sidebar-note:hover { border-color: var(--faint); }
.sidebar-note .remove { position: absolute; top: 5px; right: 6px; }
.sidebar-note .loc { color: var(--faint); font-family: var(--mono); font-size: 11px; margin-bottom: 4px; }
.sidebar-note .body { line-height: 1.45; white-space: pre-wrap; padding-right: 14px; }
.badge { display: inline-block; font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 1px 6px; border-radius: 4px; margin-right: 6px; vertical-align: middle; }
.badge.comment { background: #5b9df622; color: var(--accent); }
.badge.question { background: #d6a14a22; color: var(--warn); }
.badge.change { background: #e5707a22; color: var(--del-fg); }
.general { padding: 10px 12px; border-top: 1px solid var(--border-soft); }
.general textarea { width: 100%; min-height: 52px; background: var(--bg-inset); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-family: var(--sans); font-size: 13px; resize: vertical; }
.sidebar-actions { padding: 10px 12px; border-top: 1px solid var(--border-soft); display: flex; flex-direction: column; gap: 8px; }
.status-line { font-size: 11.5px; color: var(--muted); text-align: center; line-height: 1.4; }
.status-line.ok { color: var(--add-fg); }
.status-line.err { color: var(--del-fg); }

.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; color: var(--muted); padding: 40px; text-align: center; }
.empty h1 { color: var(--text); }
.empty textarea { width: 100%; max-width: 640px; min-height: 200px; background: var(--bg-inset); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: var(--mono); font-size: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
// diffreader — single-file, dependency-free UI. DOM is built with createElement
// and textContent only (no innerHTML), so there is nothing to compile and
// nothing opaque to audit.

// ---------- unified-diff parser ----------
function parseDiff(text) {
  if (!text || !text.trim()) return [];
  const lines = text.split("\n");
  const files = [];
  let file = null, hunk = null;
  const strip = (p) => p.replace(/^a\//, "").replace(/^b\//, "").trim();
  const startFile = (oldPath, newPath) => {
    file = { oldPath, newPath, path: newPath && newPath !== "/dev/null" ? newPath : oldPath, hunks: [], meta: [], binary: false };
    files.push(file); hunk = null;
  };
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith("diff --git")) {
      const m = line.match(/^diff --git a\/(.+?) b\/(.+)$/);
      startFile(m ? m[1] : null, m ? m[2] : null); file.meta.push(line); continue;
    }
    if (!file) {
      if (line.startsWith("--- ")) startFile(strip(line.slice(4)), null); else continue;
    }
    if (line.startsWith("--- ")) { file.oldPath = strip(line.slice(4)); continue; }
    if (line.startsWith("+++ ")) { file.newPath = strip(line.slice(4)); file.path = file.newPath && file.newPath !== "/dev/null" ? file.newPath : file.oldPath; continue; }
    if (line.startsWith("Binary files") || line.includes("GIT binary patch")) { file.binary = true; continue; }
    if (/^(index |old mode|new mode|deleted file|new file|rename |similarity |copy )/.test(line)) { file.meta.push(line); continue; }
    if (line.startsWith("@@")) {
      const m = line.match(/^@@ -(\d+)(?:,(\d+))? \+(\d+)(?:,(\d+))? @@(.*)$/);
      const oldStart = m ? parseInt(m[1], 10) : 0, newStart = m ? parseInt(m[3], 10) : 0;
      hunk = { header: line, lines: [], _oldNo: oldStart, _newNo: newStart };
      file.hunks.push(hunk); continue;
    }
    if (!hunk) continue;
    const marker = line[0];
    if (marker === "+") hunk.lines.push({ type: "add", content: line.slice(1), oldNo: null, newNo: hunk._newNo++ });
    else if (marker === "-") hunk.lines.push({ type: "del", content: line.slice(1), oldNo: hunk._oldNo++, newNo: null });
    else if (marker === "\\") hunk.lines.push({ type: "meta", content: line.slice(1).trim(), oldNo: null, newNo: null });
    else { const content = marker === " " ? line.slice(1) : line; hunk.lines.push({ type: "context", content, oldNo: hunk._oldNo++, newNo: hunk._newNo++ }); }
  }
  return files;
}
function fileStatus(f) {
  if (f.oldPath === "/dev/null") return "added";
  if (f.newPath === "/dev/null") return "deleted";
  if (f.meta.some((m) => m.startsWith("rename "))) return "renamed";
  return "modified";
}
function fileStats(f) {
  let added = 0, removed = 0;
  for (const h of f.hunks) for (const l of h.lines) { if (l.type === "add") added++; else if (l.type === "del") removed++; }
  return { added, removed };
}
function toSplitRows(lines) {
  const rows = []; let dels = [], adds = [];
  const flush = () => { const n = Math.max(dels.length, adds.length); for (let i = 0; i < n; i++) rows.push({ left: dels[i] || null, right: adds[i] || null }); dels = []; adds = []; };
  for (const l of lines) {
    if (l.type === "del") dels.push(l);
    else if (l.type === "add") adds.push(l);
    else if (l.type === "meta") { flush(); rows.push({ meta: l }); }
    else { flush(); rows.push({ left: l, right: l }); }
  }
  flush(); return rows;
}

// ---------- tiny DOM helper (no innerHTML) ----------
function el(tag, attrs) {
  const node = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    const v = attrs[k];
    if (v == null || v === false) continue;
    if (k === "class") node.className = v;
    else if (k === "text") node.textContent = v;
    else if (k.slice(0, 2) === "on") node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  }
  for (let i = 2; i < arguments.length; i++) append(node, arguments[i]);
  return node;
}
function append(node, kid) {
  if (kid == null || kid === false) return;
  if (Array.isArray(kid)) { for (const k of kid) append(node, k); return; }
  node.append(kid.nodeType ? kid : document.createTextNode(String(kid)));
}

// ---------- state ----------
const NOTE_TYPES = [
  { value: "comment", label: "Comment" },
  { value: "question", label: "Question" },
  { value: "change", label: "Change request" },
];
let _id = 0;
const newId = () => "n" + Date.now().toString(36) + (_id++).toString(36);
const lineKey = (file, side, line) => file + "::" + side + "::" + line;
const sign = (t) => (t === "add" ? "+" : t === "del" ? "-" : t === "meta" ? "" : " ");
const statusGlyph = (s) => ({ added: "A", deleted: "D", renamed: "R", modified: "M" }[s] || "M");
function shortPath(p) { const parts = (p || "").split("/"); return parts.length > 2 ? "…/" + parts.slice(-2).join("/") : p; }

const state = {
  session: null, files: [], totals: { files: 0, added: 0, removed: 0 },
  view: "unified", notes: [], general: "", activeFile: null,
  openForm: null, openTarget: null, collapsed: {}, hasServer: false,
  paste: false, pasteText: "", saveMsg: null,
};
let draft = { type: "comment", body: "" };
const root = document.getElementById("root");

function setSession(data, hasServer) {
  state.session = data; state.hasServer = !!hasServer;
  state.files = parseDiff(data.diff || "");
  let added = 0, removed = 0;
  for (const f of state.files) { const s = fileStats(f); added += s.added; removed += s.removed; }
  state.totals = { files: state.files.length, added, removed };
  if (state.files.length) state.activeFile = state.files[0].path;
  const saved = localStorage.getItem("diffreader:notes:" + (data.id || "default"));
  if (saved) { try { const p = JSON.parse(saved); state.notes = p.notes || []; state.general = p.general || ""; } catch (e) {} }
}
function persist() {
  if (!state.session) return;
  localStorage.setItem("diffreader:notes:" + (state.session.id || "default"), JSON.stringify({ notes: state.notes, general: state.general }));
}
function addNote(target, type, body) {
  state.notes.push({ id: newId(), file: target.file, side: target.side, line: target.line, code: target.code, type, body });
  state.openForm = null; state.openTarget = null; persist(); render();
}
function removeNote(id) { state.notes = state.notes.filter((n) => n.id !== id); persist(); render(); }
function toggleForm(key, target) {
  if (state.openForm === key) { state.openForm = null; state.openTarget = null; }
  else { state.openForm = key; state.openTarget = target; draft = { type: "comment", body: "" }; }
  render();
}
function buildOutput() {
  return {
    version: 1, sessionId: (state.session && state.session.id) || null,
    title: (state.session && state.session.title) || null,
    reviewedAt: new Date().toISOString(), summary: state.general.trim() || null,
    annotations: state.notes.map((n) => ({ file: n.file, line: n.line, side: n.side, type: n.type, code: n.code, body: n.body })),
  };
}
async function sendToAgent() {
  const out = buildOutput();
  if (state.hasServer) {
    try {
      const r = await fetch("/api/annotations", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(out) });
      if (!r.ok) throw new Error(await r.text());
      state.saveMsg = { ok: true, msg: "Saved to .diffreader/annotations.json — tell the agent it is ready." };
    } catch (e) { state.saveMsg = { ok: false, msg: "Save failed: " + e.message }; }
  } else {
    downloadJSON(out);
    state.saveMsg = { ok: true, msg: "Downloaded annotations.json — hand it back to the agent." };
  }
  render();
}
async function copyJSON() {
  await navigator.clipboard.writeText(JSON.stringify(buildOutput(), null, 2));
  state.saveMsg = { ok: true, msg: "Copied annotations JSON to clipboard." }; render();
}
function downloadJSON(obj) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = el("a", { href: url, download: "annotations.json" }); a.click(); URL.revokeObjectURL(url);
}
function scrollToId(id) { const n = document.getElementById(id); if (n) n.scrollIntoView({ behavior: "smooth", block: "center" }); }

// ---------- render ----------
function render() {
  root.replaceChildren();
  if (state.paste) { root.append(renderPaste()); return; }
  if (!state.session) { root.append(el("div", { class: "empty" }, el("p", { text: "Loading…" }))); return; }
  root.append(el("div", { class: "app" }, renderHeader(), renderFileList(), renderMain(), renderSidebar()));
  if (state.openForm) { const ta = document.querySelector(".note-form textarea"); if (ta) ta.focus(); }
}

function renderPaste() {
  const ta = el("textarea", { placeholder: "diff --git a/file b/file\n@@ -1,3 +1,4 @@\n...", oninput: (e) => { state.pasteText = e.target.value; } });
  ta.value = state.pasteText;
  return el("div", { class: "empty" },
    el("div", null, el("h1", { text: "diffreader" }), el("p", { text: "No session found. Paste a unified diff (git diff) to review." })),
    ta,
    el("button", { class: "btn primary", onclick: () => { setSession({ title: "Pasted diff", diff: state.pasteText, id: "pasted" }, false); state.paste = false; render(); } }, "Render diff"));
}

function renderHeader() {
  const repo = state.session.repo || {};
  const h = el("header", { class: "header" }, el("div", { class: "brand", text: "diffreader" }));
  if (repo.name) h.append(el("span", { class: "repo", text: repo.name }));
  if (repo.branch) h.append(el("span", { class: "chip", text: "⎇ " + repo.branch }));
  if (state.session.baseRef) h.append(el("span", { class: "chip subtle", text: "base " + state.session.baseRef }));
  if (repo.head) h.append(el("span", { class: "chip mono subtle", title: repo.headSubject || "", text: repo.head.slice(0, 7) }));
  h.append(el("span", { class: "spacer" }));
  h.append(el("span", { class: "totals" },
    el("span", { class: "t-files", text: state.totals.files + " file" + (state.totals.files === 1 ? "" : "s") }),
    el("span", { class: "t-add", text: "+" + state.totals.added }),
    el("span", { class: "t-del", text: "-" + state.totals.removed })));
  const mkBtn = (v, label) => el("button", { class: state.view === v ? "on" : "", onclick: () => { state.view = v; render(); } }, label);
  h.append(el("div", { class: "seg" }, mkBtn("unified", "Unified"), mkBtn("split", "Split")));
  return h;
}

function renderFileList() {
  const nav = el("nav", { class: "filelist" }, el("h2", { text: "Files" }));
  for (const f of state.files) {
    const st = fileStatus(f), stats = fileStats(f);
    const count = state.notes.filter((n) => n.file === f.path).length;
    const item = el("button", { class: "filelist-item" + (state.activeFile === f.path ? " active" : ""), title: f.path,
      onclick: () => { state.activeFile = f.path; render(); scrollToId("file-" + f.path); } },
      el("span", { class: "status-dot status-" + st, text: statusGlyph(st) }),
      el("span", { class: "name", text: f.path }));
    if (count > 0) item.append(el("span", { class: "count", text: count }));
    item.append(el("span", { class: "nums" }, el("span", { class: "t-add", text: "+" + stats.added }), document.createTextNode(" "), el("span", { class: "t-del", text: "-" + stats.removed })));
    nav.append(item);
  }
  const repo = state.session.repo || {};
  if (repo.author) nav.append(el("div", { class: "repo-author", text: "authored by " + repo.author }));
  return nav;
}

function renderMain() {
  const main = el("main", { class: "main" });
  const s = state.session, repo = s.repo || {};
  if (s.summary) {
    const sum = el("section", { class: "summary" }, el("h3", { text: s.title || "What changed" }), el("p", { text: s.summary }));
    if (repo.headSubject || s.createdAt) {
      let metaText = "";
      if (repo.headSubject) metaText += repo.headSubject;
      if (repo.headSubject && s.createdAt) metaText += " · ";
      if (s.createdAt) metaText += "generated " + s.createdAt;
      sum.append(el("div", { class: "meta", text: metaText }));
    }
    main.append(sum);
  }
  const explanations = {};
  for (const fe of s.files || []) explanations[fe.path] = fe.explanation;
  for (const f of state.files) main.append(renderFile(f, explanations[f.path]));
  return main;
}

function renderFile(file, explanation) {
  const collapsed = !!state.collapsed[file.path];
  const st = fileStatus(file), stats = fileStats(file);
  const sec = el("section", { class: "file", id: "file-" + file.path });
  sec.append(el("header", { class: "file-head", onclick: () => { state.collapsed[file.path] = !collapsed; render(); } },
    el("span", { class: "chev", text: collapsed ? "›" : "⌄" }),
    el("span", { class: "status-dot status-" + st, text: statusGlyph(st) }),
    el("span", { class: "path", text: file.path }),
    el("span", { class: "spacer" }),
    el("span", { class: "t-add", text: "+" + stats.added }),
    el("span", { class: "t-del", text: "-" + stats.removed })));
  if (collapsed) return sec;
  if (explanation) sec.append(el("div", { class: "file-explanation", text: explanation }));
  if (file.binary) sec.append(el("div", { class: "binary", text: "Binary file not shown." }));
  else sec.append(state.view === "split" ? buildSplit(file) : buildUnified(file));
  return sec;
}

function addBtn(key, target) {
  return el("button", { class: "add-note", title: "Annotate this line", onclick: (e) => { e.stopPropagation(); toggleForm(key, target); } }, "+");
}
function noteCard(n) {
  return el("div", { class: "note-card" },
    el("div", { class: "note-head" }, el("span", { class: "badge " + n.type, text: n.type }), el("button", { class: "remove", onclick: () => removeNote(n.id) }, "×")),
    el("div", { class: "note-body", text: n.body }));
}
function noteForm() {
  const sel = el("select", { onchange: (e) => { draft.type = e.target.value; } });
  for (const t of NOTE_TYPES) { const o = el("option", { value: t.value, text: t.label }); if (t.value === draft.type) o.selected = true; sel.append(o); }
  const ta = el("textarea", { placeholder: "Comment, question, or requested change… (Cmd/Ctrl+Enter to save)",
    oninput: (e) => { draft.body = e.target.value; },
    onkeydown: (e) => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) submitForm(); if (e.key === "Escape") { state.openForm = null; render(); } } });
  ta.value = draft.body;
  return el("div", { class: "note-form" },
    el("div", { class: "row" }, sel), ta,
    el("div", { class: "row" },
      el("button", { class: "btn primary", onclick: submitForm }, "Add"),
      el("button", { class: "btn", onclick: () => { state.openForm = null; render(); } }, "Cancel")));
}
function submitForm() { if (draft.body.trim()) addNote(state.openTarget, draft.type, draft.body.trim()); }

function buildUnified(file) {
  const table = el("table", { class: "hunk" });
  table.append(el("colgroup", null, el("col", { class: "c-num" }), el("col", { class: "c-num" }), el("col")));
  const tb = el("tbody");
  for (const h of file.hunks) {
    tb.append(el("tr", { class: "hunk-header" }, el("td", { colspan: 3, text: h.header })));
    for (const l of h.lines) {
      const side = l.type === "del" ? "old" : "new";
      const lineNo = side === "old" ? l.oldNo : l.newNo;
      const key = lineKey(file.path, side, lineNo);
      const lineNotes = state.notes.filter((n) => n.side === side && n.line === lineNo && lineNo != null);
      const code = el("td", { class: "code" }, el("span", { class: "sign", text: sign(l.type) }), l.content);
      if (l.type !== "meta" && lineNo != null) code.append(addBtn(key, { file: file.path, side, line: lineNo, code: l.content }));
      tb.append(el("tr", { id: "line-" + key, class: "dline " + l.type + (lineNotes.length ? " has-note" : "") },
        el("td", { class: "gutter", text: l.oldNo == null ? "" : l.oldNo }),
        el("td", { class: "gutter", text: l.newNo == null ? "" : l.newNo }), code));
      for (const n of lineNotes) tb.append(el("tr", { class: "inline-note" }, el("td", { colspan: 3 }, noteCard(n))));
      if (state.openForm === key) tb.append(el("tr", { class: "inline-note" }, el("td", { colspan: 3 }, noteForm())));
    }
  }
  table.append(tb); return table;
}

function sideCells(file, cell, side) {
  if (!cell) return [el("div", { class: "g-gutter blank" }), el("div", { class: "g-code blank" + (side === "old" ? " divide" : "") })];
  const lineNo = side === "old" ? cell.oldNo : cell.newNo;
  const cls = cell.type === "context" ? "context" : side === "old" ? "del" : "add";
  const key = lineKey(file.path, side, lineNo);
  const has = state.notes.some((n) => n.side === side && n.line === lineNo && lineNo != null);
  const code = el("div", { id: "line-" + key, class: "g-code " + cls + (side === "old" ? " divide" : "") + (has ? " has-note" : "") },
    el("span", { class: "sign", text: cls === "add" ? "+" : cls === "del" ? "-" : " " }), cell.content);
  if (cell.type !== "context" && lineNo != null) code.append(addBtn(key, { file: file.path, side, line: lineNo, code: cell.content }));
  return [el("div", { class: "g-gutter " + cls, text: lineNo == null ? "" : lineNo }), code];
}

function buildSplit(file) {
  const wrap = el("div", { class: "split" });
  for (const h of file.hunks) {
    wrap.append(el("div", { class: "srow-full hunk-header", text: h.header }));
    for (const row of toSplitRows(h.lines)) {
      if (row.meta) { wrap.append(el("div", { class: "srow-full meta", text: row.meta.content })); continue; }
      const srow = el("div", { class: "srow" });
      for (const c of sideCells(file, row.left, "old")) srow.append(c);
      for (const c of sideCells(file, row.right, "new")) srow.append(c);
      wrap.append(srow);
      [["old", row.left], ["new", row.right]].forEach(([side, cell]) => {
        if (!cell || cell.type === "context") return;
        const lineNo = side === "old" ? cell.oldNo : cell.newNo;
        const key = lineKey(file.path, side, lineNo);
        const lineNotes = state.notes.filter((n) => n.side === side && n.line === lineNo && lineNo != null);
        for (const n of lineNotes) wrap.append(el("div", { class: "srow-full inline-note" }, noteCard(n)));
        if (state.openForm === key) wrap.append(el("div", { class: "srow-full inline-note" }, noteForm()));
      });
    }
  }
  return wrap;
}

function renderSidebar() {
  const aside = el("aside", { class: "sidebar" });
  const h2 = el("h2", { text: "Annotations" });
  if (state.notes.length) h2.append(el("span", { class: "count", text: state.notes.length }));
  aside.append(h2);
  const list = el("div", { class: "sidebar-notes" });
  if (!state.notes.length) {
    const hint = el("p", { class: "hint" }, "Hover a line and click ", el("strong", { text: "+" }), " to add a comment, question, or change request.");
    list.append(hint);
  }
  for (const n of state.notes) {
    list.append(el("div", { class: "sidebar-note", onclick: () => scrollToId("line-" + lineKey(n.file, n.side, n.line)) },
      el("button", { class: "remove", onclick: (e) => { e.stopPropagation(); removeNote(n.id); } }, "×"),
      el("div", { class: "loc", text: shortPath(n.file) + ":" + (n.line == null ? "—" : n.line) }),
      el("div", { class: "body" }, el("span", { class: "badge " + n.type, text: n.type }), n.body)));
  }
  aside.append(list);
  const gen = el("textarea", { placeholder: "Overall comments or questions about the change set…", oninput: (e) => { state.general = e.target.value; persist(); } });
  gen.value = state.general;
  aside.append(el("div", { class: "general" }, el("h2", { text: "General notes" }), gen));
  const actions = el("div", { class: "sidebar-actions" },
    el("button", { class: "btn primary", onclick: sendToAgent }, state.hasServer ? "Send to agent" : "Download annotations"),
    el("button", { class: "btn", onclick: copyJSON }, "Copy JSON"));
  if (state.saveMsg) actions.append(el("div", { class: "status-line " + (state.saveMsg.ok ? "ok" : "err"), text: state.saveMsg.msg }));
  aside.append(actions);
  return aside;
}

// ---------- boot ----------
fetch("/api/session")
  .then((r) => (r.ok ? r.json() : Promise.reject(r.status)))
  .then((data) => { setSession(data, true); render(); })
  .catch(() => fetch("/session.json")
    .then((r) => (r.ok ? r.json() : Promise.reject()))
    .then((data) => { setSession(data, false); render(); })
    .catch(() => { state.paste = true; render(); }));
render();
</script>
</body>
</html>
