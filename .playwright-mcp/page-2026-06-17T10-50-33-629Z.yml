  - main [ref=e104]:
    - generic [ref=e105]:
      - 'heading "Initial diffreader build: protocol, UI, server, slash command" [level=3] [ref=e106]'
      - paragraph [ref=e107]: "First implementation of diffreader — a lightweight, agent-driven git diff reader for human-in-the-loop review. WHAT: A Vite+React UI for reading a unified diff and annotating it inline (comment / question / change request), a zero-dependency Node server that bridges the review protocol, a minimal dependency-free unified-diff parser, the protocol spec, and a portable /diff-review slash command (plus a Codex prompt equivalent). WHY: The goal is a protocol, not an app — an agent writes .diffreader/session.json, a human annotates in the browser, and the agent reads .diffreader/annotations.json back. No backend service, no database, nothing leaves the machine. This is diffreader reviewing its own creation. Every file now carries a per-file readout (see the banner under each file header)."
      - generic [ref=e108]: "harden local server: loopback bind, DNS-rebinding + CSRF guards, traversal boundary · generated 2026-06-17T00:00:00Z"
